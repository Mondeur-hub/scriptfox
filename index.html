<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptFox</title>
    <style>
        body{font-family:Arial,sans-serif;background:#1a1a2e;color:#fff;margin:0;padding:0}
        .header{background:#0f0f1a;padding:20px;text-align:center;border-bottom:2px solid #00d4ff}
        .logo{font-size:24px;font-weight:bold;color:#00d4ff}
        .nav{display:flex;justify-content:center;gap:10px;padding:10px;background:#16162a}
        .nav button{padding:10px 20px;border:2px solid #2a2a4a;background:transparent;color:#888;border-radius:20px;cursor:pointer}
        .nav button.active{background:#00d4ff;color:#000;border-color:#00d4ff}
        .container{max-width:800px;margin:0 auto;padding:20px}
        .box{background:#16162a;border-radius:10px;padding:20px;margin-bottom:20px;border:1px solid #2a2a4a}
        input,textarea{width:100%;padding:10px;margin:5px 0;background:#0f0f1a;border:1px solid #2a2a4a;color:#fff;border-radius:5px;box-sizing:border-box}
        button.submit{width:100%;padding:15px;background:#00d4ff;border:none;color:#000;font-weight:bold;border-radius:5px;cursor:pointer;margin-top:10px}
        .gamebox{display:none;background:#0f0f1a;padding:10px;margin-top:10px;border-radius:5px;text-align:center}
        .card{background:#16162a;border:1px solid #2a2a4a;border-radius:10px;padding:15px;margin-bottom:15px}
        .fav-btn{color:#ffcc00;cursor:pointer;font-size:20px;float:right}
        .hidden{display:none}
    </style>
</head>
<body>

<div class="header"><div class="logo">🦊 ScriptFox</div></div>
<div class="nav">
    <button class="active" onclick="showTab('upload', this)">Upload</button>
    <button onclick="showTab('scripts', this)">Scripts</button>
    <button onclick="showTab('favs', this)">Favorites</button>
    <button onclick="ownerTab()">Owner</button>
</div>

<div class="container">
    <div id="upload" class="tab">
        <div class="box">
            <input type="text" id="t" placeholder="Script name">
            <input type="text" id="d" placeholder="Description">
            <input type="number" id="g" placeholder="Game ID" onkeyup="detect()">
            <div class="gamebox" id="gb"><img id="gi" width="60" height="60"><p id="gn"></p></div>
            <textarea id="c" placeholder="Script code"></textarea>
            <button class="submit" onclick="submit()">Submit</button>
        </div>
    </div>
    <div id="scripts" class="tab hidden"><div id="sl"></div></div>
    <div id="favs" class="tab hidden"><div id="fl"></div></div>
    <div id="owner" class="tab hidden"><h4>Pending Approval</h4><div id="pl"></div></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.4/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.6.4/firebase-database.js";

  const app = initializeApp({
    apiKey: "AIzaSyCvyceW-xg9thFEblncqSg8PVJFG3DKo5w",
    projectId: "scriptfox",
    databaseURL: "https://scriptfox-default-rtdb.asia-southeast1.firebasedatabase.app"
  });

  const db = getDatabase(app);
  const dbRef = ref(db, 'scripts/');
  window.favs = JSON.parse(localStorage.getItem('favs') || '[]');

  onValue(dbRef, (snapshot) => {
    window.scripts = snapshot.val() || [];
    render();
  });

  window.saveToFirebase = (data) => set(dbRef, data);
</script>

<script>
window.scripts = [];

function showTab(n, btn){
    document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));
    document.getElementById(n).classList.remove('hidden');
    if(btn){document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active')); btn.classList.add('active');}
}

function detect(){
    let id=document.getElementById('g').value, box=document.getElementById('gb');
    if(!id){box.style.display='none';return;}
    box.style.display='block';
    document.getElementById('gn').textContent = "Game ID: " + id;
    document.getElementById('gi').src='https://assetgame.roblox.com/Game/Tools/ThumbnailAsset.ashx?aid='+id+'&fmt=png&wd=420&ht=420';
}

function submit(){
    let t=document.getElementById('t').value, d=document.getElementById('d').value, g=document.getElementById('g').value, c=document.getElementById('c').value;
    if(!t || !g || !c || !d) return alert("Fill everything!");
    window.scripts.push({ id: Date.now(), title: t, desc: d, gameId: g, code: c, status: 'pending' });
    window.saveToFirebase(window.scripts);
    alert("Sent for approval!");
    document.getElementById('t').value=''; document.getElementById('d').value=''; document.getElementById('g').value=''; document.getElementById('c').value='';
}

function toggleFav(id){
    if(window.favs.includes(id)) window.favs = window.favs.filter(x => x != id);
    else window.favs.push(id);
    localStorage.setItem('favs', JSON.stringify(window.favs));
    render();
}

function render(){
    let sl = document.getElementById('sl'), fl = document.getElementById('fl'), h='', fh='';
    window.scripts.filter(s => s.status == 'approved').forEach(s => {
        let card = `<div class="card"><span class="fav-btn" onclick="toggleFav(${s.id})">${window.favs.includes(s.id)?'★':'☆'}</span><h4>${s.title}</h4><p>${s.desc}</p><button onclick="alert('${s.code}')">View Code</button></div>`;
        h += card;
        if(window.favs.includes(s.id)) fh += card;
    });
    sl.innerHTML = h; fl.innerHTML = fh;
    renderOwner();
}

function renderOwner(){
    let h = '';
    window.scripts.filter(s => s.status == 'pending').forEach(s => {
        h += `<div class="card"><h4>${s.title}</h4><p>${s.desc}</p><button onclick="approve(${s.id})">Approve</button></div>`;
    });
    document.getElementById('pl').innerHTML = h || 'No pending scripts.';
}

function approve(id){
    let s = window.scripts.find(x => x.id == id);
    if(s) { s.status = 'approved'; window.saveToFirebase(window.scripts); }
}

function ownerTab(){
    if(prompt("Password:") == "Ilovesofia26") showTab('owner');
    else alert("Wrong!");
}
</script>
</body>
</html>
