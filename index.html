<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptFox</title>
    <style>
        body{font-family:Arial,sans-serif;background:#1a1a2e;color:#fff;margin:0;padding:0;overflow-x:hidden}
        .header{background:#0f0f1a;padding:20px;text-align:center;border-bottom:2px solid #00d4ff}
        .logo{font-size:24px;font-weight:bold;color:#00d4ff}
        .nav{display:flex;justify-content:center;gap:10px;padding:10px;background:#16162a}
        .nav button{padding:10px 20px;border:2px solid #2a2a4a;background:transparent;color:#888;border-radius:20px;cursor:pointer;font-weight:bold}
        .nav button.active{background:#00d4ff;color:#000;border-color:#00d4ff}
        .container{max-width:800px;margin:0 auto;padding:20px}
        
        .tab{display:block;}
        .hidden{display:none;}
        
        .box{background:#16162a;border-radius:10px;padding:20px;margin-bottom:20px;border:1px solid #2a2a4a}
        input,textarea{width:100%;padding:10px;margin:5px 0;background:#0f0f1a;border:1px solid #2a2a4a;color:#fff;border-radius:5px;box-sizing:border-box}
        textarea#d { height: 100px; }
        textarea#c { font-family: monospace; height: 150px; background:#05050a}
        
        button.submit{width:100%;padding:15px;background:#00d4ff;border:none;color:#000;font-weight:bold;border-radius:5px;cursor:pointer;margin-top:10px}
        .btn-red{background:#ff4b2b !important; color:#fff !important;}

        .gamebox{display:none;background:#0f0f1a;padding:15px;margin-top:10px;border-radius:10px;text-align:center;border:2px solid #00d4ff}
        #gi{border-radius:12px; margin-bottom:10px; border: 1px solid #2a2a4a; width: 120px; height: 120px;}
        
        .card{background:#16162a;border:1px solid #2a2a4a;border-radius:10px;padding:15px;margin-bottom:15px;display:flex;align-items:center}
        .thumb-img{width: 80px; height: 80px; border-radius: 8px; margin-right: 15px; object-fit: cover;}
        .card-info{flex:1}

        #modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;justify-content:center;align-items:center;z-index:9999}
        .modal-content{background:#16162a;width:90%;max-width:600px;padding:20px;border-radius:10px;border:1px solid #00d4ff}
        .code-display{background:#05050a;color:#00ff88;padding:15px;border-radius:5px;overflow-x:auto;max-height:300px;white-space:pre-wrap;font-family:monospace;border:1px solid #2a2a4a;margin:15px 0}
        .copy-btn{background:#00d4ff;color:#000;border:none;padding:10px;border-radius:5px;cursor:pointer;width:100%;font-weight:bold}
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="margin-top:0;color:#00d4ff">Script Code</h3>
        <div class="code-display" id="code-text"></div>
        <button class="copy-btn" onclick="copyCode()">Copy Code</button>
        <button onclick="document.getElementById('modal').style.display='none'" style="margin-top:10px;width:100%;padding:10px;background:none;border:1px solid #333;color:#fff;cursor:pointer">Close</button>
    </div>
</div>

<div class="header"><div class="logo">🦊 ScriptFox</div></div>
<div class="nav">
    <button class="active" onclick="showTab('upload', this)">Upload</button>
    <button onclick="showTab('scripts', this)">Scripts</button>
    <button onclick="showTab('favs', this)">Favorites</button>
    <button onclick="checkOwner(this)">Owner</button>
</div>

<div class="container">
    <div id="upload" class="tab">
        <div class="box">
            <h3>Upload Script</h3>
            <input type="text" id="t" placeholder="Script name">
            <input type="text" id="thumbUrl" placeholder="Thumbnail URL (Optional)">
            <textarea id="d" placeholder="Description"></textarea>
            <input type="number" id="g" placeholder="Game/Place ID" oninput="detect()">
            <div class="gamebox" id="gb">
                <img id="gi" src="">
                <p id="gn" style="color:#00d4ff;font-weight:bold;margin:0">Fetching...</p>
            </div>
            <textarea id="c" placeholder="Paste Script Code Here"></textarea>
            <button class="submit" onclick="submit()">Submit Script</button>
        </div>
    </div>

    <div id="scripts" class="tab hidden">
        <h3>Available Scripts</h3>
        <div id="sl"></div>
    </div>

    <div id="favs" class="tab hidden">
        <h3>My Favorites</h3>
        <div id="fl"></div>
    </div>

    <div id="owner" class="tab hidden">
        <h3>🦊 Welcome Owner</h3>
        <p>Pending scripts for approval:</p>
        <div id="pl"></div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.4/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.6.4/firebase-database.js";

  const app = initializeApp({
    apiKey: "AIzaSyCvyceW-xg9thFEblncqSg8PVJFG3DKo5w",
    projectId: "scriptfox",
    databaseURL: "https://scriptfox-default-rtdb.asia-southeast1.firebasedatabase.app"
  });

  const db = getDatabase(app);
  const dbRef = ref(db, 'scripts/');
  window.favs = JSON.parse(localStorage.getItem('favs') || '[]');

  onValue(dbRef, (snapshot) => {
    window.scripts = snapshot.val() || [];
    render();
  });

  window.saveToFirebase = (data) => set(dbRef, data);
</script>

<script>
window.scripts = [];
window.isLoggedIn = false;
window.detectedIcon = "https://www.roblox.com/asset-thumbnail/image?assetId=1&width=420&height=420&format=png";

function showTab(n, btn){
    document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
    document.getElementById(n).classList.remove('hidden');
    if(btn){
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
}

function checkOwner(btn){
    if(window.isLoggedIn) return showTab('owner', btn);
    let p = prompt("Enter Owner Password:");
    if(p === "Ilovesofia26") {
        window.isLoggedIn = true;
        alert("Welcome, Boss.");
        render(); // Reloads scripts to show delete buttons
        showTab('owner', btn);
    } else { alert("Wrong Password!"); }
}

async function detect() {
    let id = document.getElementById('g').value.trim();
    let box = document.getElementById('gb'), img = document.getElementById('gi'), name = document.getElementById('gn');
    if(id.length > 5) {
        box.style.display = 'block';
        try {
            const res = await fetch(`https://games.roproxy.com/v1/games/multiget-place-details?placeIds=${id}`);
            const data = await res.json();
            if(data[0]) {
                name.textContent = data[0].name;
                const iconRes = await fetch(`https://thumbnails.roproxy.com/v1/places/gameicons?placeIds=${id}&size=150x150&format=Png`);
                const iconData = await iconRes.json();
                window.detectedIcon = iconData.data[0].imageUrl;
                img.src = window.detectedIcon;
            }
        } catch(e) { name.textContent = "Error fetching info"; }
    } else { box.style.display = 'none'; }
}

function submit(){
    let t=document.getElementById('t').value, d=document.getElementById('d').value, g=document.getElementById('g').value, c=document.getElementById('c').value, thumb=document.getElementById('thumbUrl').value;
    if(!t || !g || !c || !d) return alert("Fill everything!");
    window.scripts.push({ id: Date.now(), title: t, desc: d, gameId: g, code: c, thumb: thumb || window.detectedIcon, status: 'pending' });
    window.saveToFirebase(window.scripts);
    alert("Sent for approval!");
    document.getElementById('t').value=''; document.getElementById('d').value=''; document.getElementById('g').value=''; document.getElementById('c').value='';
    document.getElementById('gb').style.display='none';
}

function render(){
    let sl = document.getElementById('sl'), fl = document.getElementById('fl'), h='', fh='';
    window.scripts.filter(s => s.status == 'approved').forEach(s => {
        // Only YOU see this button after logging in
        let deleteBtn = window.isLoggedIn ? `<button onclick="reject(${s.id})" class="submit btn-red" style="width:auto;padding:5px 10px;margin-left:5px">Delete</button>` : '';
        
        let card = `<div class="card">
            <img src="${s.thumb}" class="thumb-img">
            <div class="card-info">
                <h4>${s.title}</h4>
                <p style="font-size:12px;color:#bbb">${s.desc}</p>
                <button class="submit" style="width:auto;padding:5px 15px" onclick="openModal(${s.id})">View Code</button>
                ${deleteBtn}
            </div>
        </div>`;
        h += card; if(window.favs.includes(s.id)) fh += card;
    });
    sl.innerHTML = h || 'No scripts approved yet.';
    fl.innerHTML = fh || 'No favorites.';
    renderOwner();
}

function renderOwner(){
    let h = '';
    window.scripts.filter(s => s.status == 'pending').forEach(s => {
        h += `<div class="card">
            <div class="card-info">
                <h4>${s.title}</h4>
                <button class="submit" style="width:auto;margin-right:10px" onclick="approve(${s.id})">Approve</button>
                <button class="submit btn-red" style="width:auto" onclick="reject(${s.id})">Reject</button>
            </div>
        </div>`;
    });
    document.getElementById('pl').innerHTML = h || 'No pending scripts.';
}

function openModal(id){
    let s = window.scripts.find(x => x.id == id);
    if(s) { document.getElementById('modal-title').textContent = s.title; document.getElementById('code-text').textContent = s.code; document.getElementById('modal').style.display = 'flex'; }
}

function copyCode(){ navigator.clipboard.writeText(document.getElementById('code-text').textContent).then(() => alert("Copied!")); }
function approve(id){ let s = window.scripts.find(x => x.id == id); if(s) { s.status = 'approved'; window.saveToFirebase(window.scripts); } }
function reject(id){ if(confirm("Are you sure you want to delete this script?")){ window.scripts = window.scripts.filter(x => x.id != id); window.saveToFirebase(window.scripts); } }
</script>
</body>
</html>
